<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iran–Israel Conflict · Live News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0b;
    --surface: #111113;
    --surface2: #1a1a1e;
    --border: #2a2a30;
    --border2: #3a3a42;
    --text: #e8e8ec;
    --muted: #7a7a88;
    --dim: #44444f;
    --accent: #ff4a1c;
    --accent2: #ffb347;
    --blue: #3a8fff;
    --green: #22c55e;
    --red: #ff4a4a;
    --tag-mil: #ff4a1c;
    --tag-dip: #3a8fff;
    --tag-nuc: #a855f7;
    --tag-eco: #22c55e;
    --tag-prx: #ffb347;
    --tag-us: #06b6d4;
    --tag-def: #7a7a88;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 0 20px 60px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    padding: 36px 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .flag-strip {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 10px;
  }

  .flag { font-size: 20px; }
  .vs { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--dim); letter-spacing: 2px; }

  h1 {
    font-size: clamp(24px, 5vw, 38px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 0.5px;
  }

  /* Status pill */
  .status-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    flex-shrink: 0;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 6px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 1.8s ease-in-out infinite;
    flex-shrink: 0;
  }
  .live-dot.paused { background: var(--red); animation: none; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  #countdown-txt {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    text-align: right;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .btn:hover { background: var(--surface2); border-color: var(--text); }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn.danger:hover { background: rgba(255,74,74,0.1); }
  .btn.safe { border-color: var(--green); color: var(--green); }
  .btn.safe:hover { background: rgba(34,197,94,0.1); }

  .stat-strip {
    margin-left: auto;
    display: flex;
    gap: 20px;
  }

  .stat { text-align: right; }
  .stat-val { font-size: 18px; font-weight: 700; color: var(--text); }
  .stat-lbl { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--dim); letter-spacing: 1px; text-transform: uppercase; }

  /* Filter tabs */
  .filter-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }

  .ftag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .ftag:hover { border-color: var(--border2); color: var(--text); }
  .ftag.active { background: var(--surface2); border-color: var(--border2); color: var(--text); }
  .ftag[data-cat="Military"].active { border-color: var(--tag-mil); color: var(--tag-mil); }
  .ftag[data-cat="Diplomacy"].active { border-color: var(--tag-dip); color: var(--tag-dip); }
  .ftag[data-cat="Nuclear"].active { border-color: var(--tag-nuc); color: var(--tag-nuc); }
  .ftag[data-cat="Economy"].active { border-color: var(--tag-eco); color: var(--tag-eco); }
  .ftag[data-cat="Proxies"].active { border-color: var(--tag-prx); color: var(--tag-prx); }
  .ftag[data-cat="US Involvement"].active { border-color: var(--tag-us); color: var(--tag-us); }

  /* Loader bar */
  #loader-bar {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 20px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.2s;
  }
  #loader-bar.active { opacity: 1; }
  #loader-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* News cards */
  #feed { display: flex; flex-direction: column; gap: 1px; }

  .card {
    background: var(--surface);
    border-left: 2px solid var(--border);
    padding: 16px 18px;
    transition: border-color 0.15s;
    animation: slideIn 0.35s ease forwards;
    opacity: 0;
  }
  .card:hover { border-left-color: var(--accent); background: var(--surface2); }

  @keyframes slideIn {
    from { opacity:0; transform: translateX(-8px); }
    to   { opacity:1; transform: translateX(0); }
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 9px;
    flex-wrap: wrap;
  }

  .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 500;
    flex-shrink: 0;
  }
  .tag-Military  { background: rgba(255,74,28,0.12);  color: var(--tag-mil); border: 1px solid rgba(255,74,28,0.25); }
  .tag-Diplomacy { background: rgba(58,143,255,0.12); color: var(--tag-dip); border: 1px solid rgba(58,143,255,0.25); }
  .tag-Nuclear   { background: rgba(168,85,247,0.12); color: var(--tag-nuc); border: 1px solid rgba(168,85,247,0.25); }
  .tag-Economy   { background: rgba(34,197,94,0.12);  color: var(--tag-eco); border: 1px solid rgba(34,197,94,0.25); }
  .tag-Proxies   { background: rgba(255,179,71,0.12); color: var(--tag-prx); border: 1px solid rgba(255,179,71,0.25); }
  .tag-US        { background: rgba(6,182,212,0.12);  color: var(--tag-us);  border: 1px solid rgba(6,182,212,0.25); }
  .tag-General   { background: rgba(122,122,136,0.12); color: var(--tag-def); border: 1px solid rgba(122,122,136,0.25); }

  .card-time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .card-source {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    margin-left: auto;
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 10px;
  }

  .card-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .card-link {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.3px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .card-link:hover { text-decoration: underline; }
  .card-link::after { content: '↗'; font-size: 10px; }

  /* Empty / error states */
  .state-msg {
    padding: 40px 20px;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--dim);
    border: 1px dashed var(--border);
    border-radius: 4px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Command hint */
  .cmd-hint {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    padding: 12px 0 0;
    letter-spacing: 0.5px;
  }
  .cmd-hint kbd {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 3px;
    padding: 2px 6px;
    font-size: 10px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  @media (max-width: 500px) {
    .stat-strip { display: none; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-top">
      <div>
        <div class="flag-strip">
          <span class="flag">🇮🇷</span>
          <span class="vs">VS</span>
          <span class="flag">🇮🇱</span>
        </div>
        <h1>Iran–<span>Israel</span><br>Conflict Tracker</h1>
        <p class="subtitle">// free · rss-powered · no api key · auto-refresh</p>
      </div>
      <div class="status-wrap">
        <div class="status-pill">
          <div class="live-dot" id="dot"></div>
          <span id="status-label">LIVE</span>
        </div>
        <div id="countdown-txt">—</div>
      </div>
    </div>
  </header>

  <div class="controls">
    <button class="btn danger" id="toggle-btn" onclick="toggleStream()">⏸ Pause</button>
    <button class="btn" onclick="fetchNow()">↺ Fetch now</button>
    <div class="stat-strip">
      <div class="stat">
        <div class="stat-val" id="total-count">0</div>
        <div class="stat-lbl">Updates</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="fetch-count">0</div>
        <div class="stat-lbl">Fetches</div>
      </div>
    </div>
  </div>

  <div class="filter-bar" id="filter-bar">
    <button class="ftag active" data-cat="All" onclick="setFilter('All')">All</button>
    <button class="ftag" data-cat="Military" onclick="setFilter('Military')">Military</button>
    <button class="ftag" data-cat="Diplomacy" onclick="setFilter('Diplomacy')">Diplomacy</button>
    <button class="ftag" data-cat="Nuclear" onclick="setFilter('Nuclear')">Nuclear</button>
    <button class="ftag" data-cat="Economy" onclick="setFilter('Economy')">Economy</button>
    <button class="ftag" data-cat="Proxies" onclick="setFilter('Proxies')">Proxies</button>
    <button class="ftag" data-cat="US Involvement" onclick="setFilter('US Involvement')">US / Intl</button>
  </div>

  <div id="loader-bar"><div id="loader-fill"></div></div>

  <div id="feed">
    <div class="state-msg">Fetching latest updates…</div>
  </div>

  <p class="cmd-hint">Tip: Press <kbd>Space</kbd> to pause/resume · <kbd>R</kbd> to refresh now · <kbd>C</kbd> to clear feed</p>
</div>

<script>
  // ── Config ──────────────────────────────────────────────
  const REFRESH_INTERVAL = 3 * 60; // seconds
  const RSS_SOURCES = [
    {
      name: 'Google News',
      url: 'https://news.google.com/rss/search?q=iran+israel+war+conflict&hl=en-US&gl=US&ceid=US:en',
      proxy: true
    },
    {
      name: 'Google News',
      url: 'https://news.google.com/rss/search?q=Iran+Israel+military+attack+strike&hl=en-US&gl=US&ceid=US:en',
      proxy: true
    },
    {
      name: 'Google News',
      url: 'https://news.google.com/rss/search?q=Iran+nuclear+Israel+2025&hl=en-US&gl=US&ceid=US:en',
      proxy: true
    }
  ];

  const CORS_PROXY = 'https://api.allorigins.win/get?url=';

  // ── State ────────────────────────────────────────────────
  let running = true;
  let seenGuids = new Set();
  let allCards = [];
  let activeFilter = 'All';
  let fetchCount = 0;
  let totalCount = 0;
  let countdownVal = 0;
  let countdownTimer = null;
  let fetchTimer = null;

  // ── Categorisation ───────────────────────────────────────
  function categorise(text) {
    const t = (text || '').toLowerCase();
    if (/missil|airstrik|bomb|drone|attack|strike|rocket|idf|irgc|explosion|blast|fire|kill|casualt|dead|wound/.test(t)) return 'Military';
    if (/nuclear|uranium|enrich|centrifug|natanz|fordow|iaea|atomic|weapon/.test(t)) return 'Nuclear';
    if (/ceasefire|negoti|talk|diplomat|deal|agreement|peace|un |united nations|envoy|mediati/.test(t)) return 'Diplomacy';
    if (/sanction|oil|econom|trade|financ|dollar|rial|export|import|tariff/.test(t)) return 'Economy';
    if (/hezbollah|hamas|houthi|proxy|militia|gaza|lebanon|syria|iraq|yemen/.test(t)) return 'Proxies';
    if (/us |usa|united states|pentagon|biden|trump|white house|state dept|nato|uk |europe|russia|china/.test(t)) return 'US Involvement';
    return 'General';
  }

  function tagClass(cat) {
    const map = { Military:'Military', Diplomacy:'Diplomacy', Nuclear:'Nuclear', Economy:'Economy', Proxies:'Proxies', 'US Involvement':'US', General:'General' };
    return 'tag tag-' + (map[cat] || 'General');
  }

  // ── Time format ──────────────────────────────────────────
  function fmtTime(d) {
    return d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true })
      + ' · ' + d.toLocaleDateString('en-IN', { day:'numeric', month:'short' });
  }

  // ── Fetch RSS ────────────────────────────────────────────
  async function fetchFeed(src) {
    const encodedUrl = encodeURIComponent(src.url);
    const proxyUrl = CORS_PROXY + encodedUrl;
    const resp = await fetch(proxyUrl);
    const json = await resp.json();
    const xml = new DOMParser().parseFromString(json.contents, 'text/xml');
    return Array.from(xml.querySelectorAll('item'));
  }

  function extractLink(item) {
    // Google News wraps links in guid
    const guid = item.querySelector('guid')?.textContent || '';
    const link = item.querySelector('link')?.textContent || guid || '#';
    return link.startsWith('http') ? link : '#';
  }

  function extractSource(item) {
    return item.querySelector('source')?.textContent
      || item.querySelector('source')?.getAttribute('name')
      || 'News source';
  }

  function stripHtml(str) {
    return (str || '').replace(/<[^>]+>/g, '').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'").trim();
  }

  // ── Render ───────────────────────────────────────────────
  function renderCards(cards) {
    const feed = document.getElementById('feed');
    const filtered = activeFilter === 'All' ? cards : cards.filter(c => c.cat === activeFilter);
    if (filtered.length === 0) {
      feed.innerHTML = '<div class="state-msg">No items in this category yet.</div>';
      return;
    }
    feed.innerHTML = '';
    filtered.forEach(c => {
      const div = document.createElement('div');
      div.className = 'card';
      div.dataset.cat = c.cat;
      div.innerHTML = `
        <div class="card-meta">
          <span class="${tagClass(c.cat)}">${c.cat}</span>
          <span class="card-time">${c.time}</span>
          <span class="card-source">${c.source}</span>
        </div>
        <div class="card-title">${c.title}</div>
        ${c.desc ? `<div class="card-desc">${c.desc.slice(0,180)}${c.desc.length>180?'…':''}</div>` : ''}
        <a class="card-link" href="${c.link}" target="_blank" rel="noopener">Read full article</a>
      `;
      feed.appendChild(div);
    });
  }

  function setFilter(cat) {
    activeFilter = cat;
    document.querySelectorAll('.ftag').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === cat);
    });
    renderCards(allCards);
  }

  // ── Loader bar ───────────────────────────────────────────
  function startLoader() {
    const bar = document.getElementById('loader-bar');
    const fill = document.getElementById('loader-fill');
    bar.classList.add('active');
    fill.style.width = '0%';
    setTimeout(() => fill.style.width = '60%', 50);
  }
  function finishLoader() {
    const fill = document.getElementById('loader-fill');
    fill.style.width = '100%';
    setTimeout(() => {
      document.getElementById('loader-bar').classList.remove('active');
      fill.style.width = '0%';
    }, 500);
  }

  // ── Main fetch ───────────────────────────────────────────
  async function fetchNow() {
    if (!running) return;
    startLoader();
    fetchCount++;
    document.getElementById('fetch-count').textContent = fetchCount;

    let newItems = [];

    for (const src of RSS_SOURCES) {
      try {
        const items = await fetchFeed(src);
        for (const item of items) {
          const guid = item.querySelector('guid')?.textContent || item.querySelector('title')?.textContent || '';
          if (!guid || seenGuids.has(guid)) continue;

          const title = stripHtml(item.querySelector('title')?.textContent || '');
          if (!title) continue;

          // Filter relevance
          const combined = (title + ' ' + (item.querySelector('description')?.textContent || '')).toLowerCase();
          if (!/iran|israel|idf|irgc|netanyahu|khamenei|tehran|tel aviv/.test(combined)) continue;

          seenGuids.add(guid);
          const desc = stripHtml(item.querySelector('description')?.textContent || '');
          const pubDate = new Date(item.querySelector('pubDate')?.textContent || Date.now());
          const cat = categorise(title + ' ' + desc);
          const source = extractSource(item);
          const link = extractLink(item);

          newItems.push({ guid, title, desc, link, source, cat, time: fmtTime(pubDate), ts: pubDate.getTime() });
        }
      } catch (e) {
        console.warn('RSS fetch error:', e);
      }
    }

    finishLoader();

    if (newItems.length > 0) {
      newItems.sort((a,b) => b.ts - a.ts);
      allCards = [...newItems, ...allCards].slice(0, 200);
      totalCount += newItems.length;
      document.getElementById('total-count').textContent = totalCount;
      renderCards(allCards);
    } else if (allCards.length === 0) {
      document.getElementById('feed').innerHTML = '<div class="state-msg">No relevant updates found. Will retry in a moment.</div>';
    }

    startCountdown(REFRESH_INTERVAL);
    clearTimeout(fetchTimer);
    fetchTimer = setTimeout(fetchNow, REFRESH_INTERVAL * 1000);
  }

  // ── Countdown ────────────────────────────────────────────
  function startCountdown(seconds) {
    clearInterval(countdownTimer);
    countdownVal = seconds;
    const el = document.getElementById('countdown-txt');
    countdownTimer = setInterval(() => {
      if (!running) { clearInterval(countdownTimer); el.textContent = 'paused'; return; }
      countdownVal--;
      if (countdownVal <= 0) { clearInterval(countdownTimer); el.textContent = 'fetching…'; return; }
      const m = Math.floor(countdownVal / 60);
      const s = String(countdownVal % 60).padStart(2, '0');
      el.textContent = `next in ${m}:${s}`;
    }, 1000);
  }

  // ── Toggle ───────────────────────────────────────────────
  function toggleStream() {
    running = !running;
    const btn = document.getElementById('toggle-btn');
    const dot = document.getElementById('dot');
    const label = document.getElementById('status-label');
    const cdEl = document.getElementById('countdown-txt');
    if (!running) {
      clearTimeout(fetchTimer);
      clearInterval(countdownTimer);
      btn.textContent = '▶ Resume';
      btn.className = 'btn safe';
      dot.classList.add('paused');
      label.textContent = 'PAUSED';
      cdEl.textContent = 'paused';
    } else {
      btn.textContent = '⏸ Pause';
      btn.className = 'btn danger';
      dot.classList.remove('paused');
      label.textContent = 'LIVE';
      fetchNow();
    }
  }

  // ── Keyboard shortcuts ───────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') { e.preventDefault(); toggleStream(); }
    if (e.key === 'r' || e.key === 'R') fetchNow();
    if (e.key === 'c' || e.key === 'C') {
      allCards = []; seenGuids.clear(); totalCount = 0;
      document.getElementById('total-count').textContent = 0;
      document.getElementById('feed').innerHTML = '<div class="state-msg">Feed cleared. Fetching fresh…</div>';
      fetchNow();
    }
  });

  // ── Init ─────────────────────────────────────────────────
  fetchNow();
</script>
</body>
</html>
